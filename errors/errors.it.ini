;UPLOAD
txt=È necessario caricare un file di testo
featuring_español=Per le canzoni in spagnolo non è consentito utilizzare "ft." o "feat.". Utilizza invece "y" oppure "con".
idioma=La lingua non è valida. Deve essere una delle seguenti: %idiomas%
edicion=L'edizione non è valida. Deve essere lasciata vuota (o omessa) se non appartiene ad alcuna edizione, altrimenti deve essere una delle seguenti: %ediciones%
singstar=Non è consentito caricare brani di SingStar
bpm=Il BPM non è stato specificato
año=L'anno non può essere precedente al 1900 né successivo all'anno corrente
solo_inicio=La riga %num% contiene soltanto un #, cosa non consentita
tag_no_permitido=Il tag %tag% non è consentito. È possibile utilizzare soltanto i seguenti tag: %tags%
tag_multi=Il tag %tag% è consentito solo per i brani multigiocatore. Per i brani a giocatore singolo sono ammessi soltanto i seguenti tag: %tags%
inizio_incorrecto=L'inizio della riga %num% del file di testo non è valido (%letra%). Sono consentiti soltanto i seguenti valori: %letras%
numero_jugadores_incorrecto=Il numero dei giocatori che cantano è indicato in modo errato alla riga %num% del file di testo. Deve essere specificato con P 1, P 2, P 3, ecc.
medley=È obbligatorio definire la versione breve del brano tramite MEDLEYSTARTBEAT e MEDLEYENDBEAT quando la parte cantata supera i 60 secondi.
medley_duracion=La durata della versione breve definita con MEDLEYSTARTBEAT e MEDLEYENDBEAT deve essere compresa tra 10 e 60 secondi. Attualmente è di %duracion%
inicio_multi=Se il brano è un duetto, deve iniziare indicando quale giocatore canta (P 1, P 2, ecc.), ma tale indicazione è assente.
error_jugador=del giocatore %jugador%
error_linea=Riga %linea%%jugador%.%salto%%error%
notas_solapadas=Note sovrapposte
salto_linea=Interruzione di riga posizionata in modo errato
notas_juntas=Note troppo ravvicinate
nota_pegada_salto=L'ultima nota è attaccata all'interruzione di riga
doradas_puntuacion=Il brano %giocatore%ha %doradas% punti ottenuti con le note dorate. Dovrebbe averne tra 1000 e 1500
doradas_porcentaje=Il brano %jugador%ha il %porcentaje%% di note dorate. Dovrebbe essere compreso tra il 10% e il 15%
duetsinger=È necessario definire i nomi dei cantanti tramite DUETSINGERP1 e DUETSINGERP2
caratula=L'immagine di copertina indicata in #COVER ha un nome errato. Dovrebbe essere %nombre%
mp3_video=L'elemento #%tag% ha un nome errato. Dovrebbe essere %nombre%
background=L'elemento #BACKGROUND ha un nome errato. Dovrebbe essere %nombre%
minimo_cancion=Il brano deve contenere almeno titolo, artista, lingua, anno, copertina e testo
tag_multi_coicidencia=Il tag %tag% del file di testo per giocatore singolo è %nombre%, ma nella versione in duetto è %nombre_multi%
torrent_tamaño=Il file torrent è troppo grande. Deve essere inferiore a 1 MB
torrent_extension=L'estensione %ext% del file torrent non è valida. Deve essere .torrent
torrent_mimetype=Il file non è un torrent valido
torrent_mas_archivos=Il torrent contiene più file di quelli consentiti
torrent_piezas=La dimensione dei blocchi del torrent supera i 256 KB e non è consentita
torrent_carpeta=La cartella contenente il brano nel torrent ha un nome errato. Dovrebbe essere %nombre_cancion% anziché %nombre_torrent%.%importante%: Se il nome suggerito non è corretto perché mancano alcuni caratteri in una parola, non rinominare nulla. Codifica invece il file di testo in UTF-8 prima di caricarlo.
importante=IMPORTANTE;
torrent_nombre=Il file torrent %archivo% ha un nome errato. Dovrebbe essere %nombre%
torrent_txt=Il nome del file di testo non è corretto. Dovrebbe essere %nombre% anziché %archivo%
torrent_txt_multi=Il nome del file di testo della versione multigiocatore non è corretto. Dovrebbe essere %nombre% anziché %archivo%
torrent_txt_coincidencia=Il file di testo caricato non corrisponde a quello contenuto nel torrent
torrent_formato_caratula=La copertina deve essere in formato PNG o JPEG
torrent_caratula_tamaño_coincidencia=La copertina caricata non corrisponde a quella contenuta nel torrent
torrent_caratula_coincidencia=Il nome della copertina nel torrent (%archivo%) non corrisponde a quello indicato nel file di testo (%nombre%)
torrent_video_coincidencia=Il nome del file video nel torrent (%archivo%) non corrisponde a quello indicato nel file di testo (%nombre%)
torrent_dentro=Il file torrent non può contenere un altro torrent
torrent_archivo_no_permitido=Il file %archivo% non è consentito all'interno del torrent
torrent_archivo_no_txt=Il file %archivo% non è presente nel file di testo del brano
torrent_announce=L'URL dell'announce deve essere %announce% anziché %announce_torrent%
torrent_privado=Il flag "privato" del torrent non è attivato
torrent_igual=Questo torrent è già presente nel database. Se hai modificato il brano, devi creare un nuovo file torrent.
subir_imagen=Errore durante il caricamento dell'immagine
guardar_txt=Errore durante il salvataggio del file di testo
guardar_txt_multi=Errore durante il salvataggio del file di testo MULTI
guardar_torrent=Errore durante il salvataggio del torrent
