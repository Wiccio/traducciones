algo_mas_karaoke_p1=Vi bezonas nur mikrofonon, komputilon, nian %worldparty% kaj la milojn da kantoj, kiujn ni disponigas al vi.
algo_mas_karaoke_p2=Por ke vi povu komenci kanti kiel eble plej rapide, ni disponigas serion da videaj lerniloj, kiuj klarigas kiel instali kaj agordi la ludon.
