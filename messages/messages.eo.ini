worldparty_titulo2=Amuziĝu kantante viajn plej ŝatatajn kantojn!
worldparty_p1=Malkovru la mondon de %worldparty%. Plibonigita versio, kiun ni kreis surbaze de la malnova UltraStar Deluxe.
worldparty_p2=Sendube temas pri la plej kompleta kaj ĝisdata versio disponebla. Ĝi enhavas ĉion, kion oni povas atendi (kantopoentadon, Festan Reĝimon, facilan kantoadministradon, kaj multe pli), kune kun granda nombro da plibonigoj kaj novaj funkcioj.
worldparty_p3=Inter la plej gravaj funkcioj troviĝas: kanti duetojn kun alia persono, prezenti mallongigitajn versiojn de kantoj, uzi la Jukebox-reĝimon por seninterrompe ludi viajn kantojn, sendi viajn poentarojn al la retejo, uzi la retkameraon de via komputilo dum kantado, subteni ĝis ses samtempajn kantantojn sur la sama ekrano, kaj multe pli.
worldparty_p4=Ĉiujn informojn vi trovos en la sekcio dediĉita al %worldparty%.
