como_pedir_cancion_titulo=Lernu kiel peti vian monatan kanton, voĉdoni por ekzistantaj petoj kaj aldoni dosierojn utilajn al la kreintoj
pedir_cancion_texto=Ĉi tie vi povas peti unu kanton monate de via plej ŝatata artisto. Se vi bonŝancos, iu eble kreos ĝin por vi, kvankam plejofte ĝi eble neniam estos kreita aŭ tio povus postuli tre longan tempon, eĉ jarojn.
pedir_cancion_texto2=Bonvolu ne fari postulojn en la komentoj. Konsideru vin bonŝanca se iam vi finfine povos kanti la kanton, kiun vi petis.
pedir_cancion_texto3=Antaŭ ol plenigi la formularon, kontrolu ĉu la kanto, kiun vi volas peti, jam troviĝas inter la %canciones% aŭ inter la ekzistantaj %peticiones%.
pedir_cancion_texto4=Jen ĉiuj informoj, kiujn vi povas provizi.
adjuntar_archivo_titulo=Aldoni dosieron al %artista% - %cancion%
adjuntar_archivo_texto=Se vi havas dosierojn utilajn por krei ĉi tiun kanton, aldonu ilin ĉi tie.
adjuntar_archivo_texto2=Vi devas provizi ligilon al la dosiero. Se vi ne povas gastigi ĝin aliloke, alŝutu ĝin al %web% kaj uzu tiun ligilon.
adjuntar_archivo_texto3=Bonvolu provizi bonkvalitajn filmetojn. Se la video jam disponeblas en YouTube aŭ simila platformo, ne necesas alŝuti ĝin denove.
adjuntar_archivo_texto4=Ĉiuj kampoj estas nedevigaj. Se ili estas plenigitaj, ili devas enhavi kompletan URL-on, inkluzive de http:// aŭ https://.
