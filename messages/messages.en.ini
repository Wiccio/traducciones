pedir_cancion=Request a song
pedir_cancion_titulo=Request your monthly song
como_pedir_cancion=How to request songs and use this section
como_pedir_cancion_titulo=How to request your monthly song, vote for existing requests and attach files to help creators
pedir_cancion_texto=Here you can request one song each month from your favourite artists. If you're lucky, someone may create it for you, although in most cases it may never be created or it could take a very long time—even years!
pedir_cancion_texto2=Please do not make demands in the comments. Consider yourself fortunate if one day you are finally able to sing your requested song.
pedir_cancion_texto3=Before completing the form, check whether the song you want to request is already listed in %canciones% or among the existing %peticiones%.
pedir_cancion_texto4=These are all the details you can provide.
adjuntar_archivo_titulo=Attach a file to %artista% - %cancion%
adjuntar_archivo_texto=If you have any files that could help with creating this song, attach them here.
adjuntar_archivo_texto2=You must provide a link to the file. If you cannot host it elsewhere, upload it to %web% and use that link instead.
adjuntar_archivo_texto3=Please try to provide high-quality videos. If the video is already available on YouTube or a similar platform, there is no need to upload it again.
adjuntar_archivo_texto4=All fields are optional. If used, they must contain a complete URL, including http:// or https://.
