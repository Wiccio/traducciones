worldparty_p2=Without doubt, it is the most feature-rich and up-to-date version available. It includes everything you would expect (singing scores, Party Mode, easy song management, and much more), together with a wide range of improvements and new features.
worldparty_p3=Among the most important features are: singing duets with another person, performing shortened versions of songs, Jukebox mode to play your songs continuously, sending your scores to the website, using your computer's webcam while singing, supporting up to six players singing simultaneously on the same screen, and much more.
