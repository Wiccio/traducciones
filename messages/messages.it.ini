como_pedir_cancion=Come richiedere un brano e utilizzare questa sezione
como_pedir_cancion_titulo=Scopri come richiedere il tuo brano mensile, votare le richieste esistenti e allegare file utili ai creatori
pedir_cancion_texto=Qui puoi richiedere ogni mese un brano del tuo artista preferito. Se sarai fortunato, qualcuno potrebbe realizzarlo per te, anche se nella maggior parte dei casi potrebbe non essere mai creato oppure richiedere moltissimo tempo, persino anni.
pedir_cancion_texto2=Ti chiediamo di non pretendere nulla nei commenti. Considerati fortunato se un giorno riuscirai finalmente a cantare il brano che hai richiesto.
pedir_cancion_texto3=Prima di compilare il modulo, verifica che il brano che desideri richiedere non sia già presente tra i %canciones% oppure tra le %peticiones% esistenti.
pedir_cancion_texto4=Queste sono tutte le informazioni che puoi fornire.
adjuntar_archivo_titulo=Allega un file a %artista% - %cancion%
adjuntar_archivo_texto=Se possiedi file che possono essere utili per realizzare questo brano, allegali qui.
adjuntar_archivo_texto2=Devi fornire un collegamento al file. Se non puoi ospitarlo altrove, caricalo su %web% e utilizza quel collegamento.
adjuntar_archivo_texto3=Cerca di fornire video di buona qualità. Se il video è già disponibile su YouTube o piattaforme simili, non è necessario caricarlo nuovamente.
adjuntar_archivo_texto4=Tutti i campi sono facoltativi. Se compilati, devono contenere un URL completo, comprensivo di http:// oppure https://.
