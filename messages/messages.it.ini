;WORLDPARTY DOWNLOAD
worldparty_titulo2=Divertiti a cantare i tuoi brani preferiti!
worldparty_p1=Scopri il mondo di %worldparty%. Una versione migliorata che abbiamo realizzato a partire dal vecchio UltraStar Deluxe.
worldparty_p2=È senza dubbio la versione più completa e aggiornata che tu possa trovare. Include tutto ciò che ci si aspetta (punteggio durante il canto, Modalità Festa, aggiunta semplificata di nuovi brani, ecc.), insieme a un'enorme quantità di miglioramenti e nuove funzionalità.
worldparty_p3=Tra le caratteristiche più importanti troviamo: cantare in duetto con un'altra persona, eseguire versioni ridotte dei brani, la modalità Jukebox per riprodurre i brani in sequenza, inviare i propri punteggi al sito web, utilizzare la webcam del computer mentre si canta, supportare fino a 6 giocatori contemporaneamente sullo stesso schermo e molto altro ancora.
