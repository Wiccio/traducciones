limite_actualizacion=Hai aggiornato %actualizadas% brani creati da altri autori su un massimo di %limite%. Questo limite viene calcolato con un rapporto di 1:%ratio% rispetto ai brani che hai caricato: più brani realizzi, più aggiornamenti potrai effettuare.
